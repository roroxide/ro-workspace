<div class="flex items-center justify-between gap-4 shrink-0 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm" dir="rtl">
  
  <div class="max-w-xs w-full relative">
    <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </span>
    <input type="text" [ngModel]="searchQuery" (ngModelChange)="onSearchChange($event)" placeholder="جستجوی کارها..." class="w-full pr-9 pl-4 py-1.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-xs shadow-inner" />
  </div>

  <div class="hidden md:flex items-center gap-2.5">
    
    <button (click)="toggleUrgent()" [ngClass]="filterUrgent ? 'bg-red-600 border-red-700 text-white shadow-inner translate-y-[1px]' : 'bg-white hover:bg-gray-50 text-gray-600 border-gray-200 shadow-sm'" class="px-3 py-1.5 border font-semibold rounded-xl text-xs transition-all flex items-center gap-1">
      <span>📌 فوری</span>
    </button>

    <button (click)="toggleImportant()" [ngClass]="filterImportant ? 'bg-indigo-600 border-indigo-700 text-white shadow-inner translate-y-[1px]' : 'bg-white hover:bg-gray-50 text-gray-600 border-gray-200 shadow-sm'" class="px-3 py-1.5 border font-semibold rounded-xl text-xs transition-all flex items-center gap-1">
      <span>⭐️ مهم</span>
    </button>

    <div class="flex items-center gap-1.5">
      <label class="text-[11px] font-bold text-gray-400">دسته‌بندی:</label>
      <select [ngModel]="selectedFilterCategoryId" (ngModelChange)="selectCategory($event)" class="bg-gray-50 border border-gray-200 text-gray-700 font-semibold text-xs rounded-xl px-3 py-1.5 focus:outline-none cursor-pointer shadow-sm">
        <option value="all">همه دسته‌ها</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

    <div class="h-4 w-px bg-gray-200 mx-1"></div>

    <button (click)="isColumnsModalOpen = true" class="px-3 py-1.5 bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 font-semibold rounded-xl text-xs shadow-sm transition-colors flex items-center gap-1.5">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 002-2h2a2 2 0 002 2"></path></svg>
      <span>ستون‌ها</span>
    </button>

  </div>

  <div class="flex md:hidden items-center gap-2">
    <button (click)="isColumnsModalOpen = true" class="p-2 bg-gray-50 border border-gray-200 hover:bg-gray-100 text-gray-600 rounded-xl transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
    </button>

    <button (click)="isFilterModalOpen = true" class="p-2 bg-gray-50 border border-gray-200 hover:bg-gray-100 text-gray-600 rounded-xl transition-colors relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
      <span *ngIf="filterUrgent || filterImportant || selectedFilterCategoryId !== 'all'" class="absolute top-1 right-1 w-2 h-2 bg-indigo-600 rounded-full"></span>
    </button>
  </div>

</div>

<div *ngIf="isColumnsModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div (click)="isColumnsModalOpen = false" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-xs rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-gray-50/50">
      <span class="font-bold text-gray-800 text-xs">نمایش/عدم نمایش ستون‌ها</span>
      <button (click)="isColumnsModalOpen = false" class="text-gray-400 hover:text-gray-600p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="p-4 space-y-3">
      <div (click)="toggleColumn('todo')" class="flex items-center justify-between bg-gray-50 hover:bg-gray-100/80 p-2.5 rounded-xl border border-gray-100 cursor-pointer select-none transition-colors">
        <span class="text-xs font-bold text-gray-700">ستون آماده</span>
        <div class="text-gray-500 p-1">
          <svg *ngIf="columnVisibility.todo" class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          <svg *ngIf="!columnVisibility.todo" class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
        </div>
      </div>

      <div (click)="toggleColumn('doing')" class="flex items-center justify-between bg-gray-50 hover:bg-gray-100/80 p-2.5 rounded-xl border border-gray-100 cursor-pointer select-none transition-colors">
        <span class="text-xs font-bold text-gray-700">ستون در حال انجام</span>
        <div class="text-gray-500 p-1">
          <svg *ngIf="columnVisibility.doing" class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          <svg *ngIf="!columnVisibility.doing" class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
        </div>
      </div>

      <div (click)="toggleColumn('done')" class="flex items-center justify-between bg-gray-50 hover:bg-gray-100/80 p-2.5 rounded-xl border border-gray-100 cursor-pointer select-none transition-colors">
        <span class="text-xs font-bold text-gray-700">ستون انجام شده</span>
        <div class="text-gray-500 p-1">
          <svg *ngIf="columnVisibility.done" class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          <svg *ngIf="!columnVisibility.done" class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="isFilterModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:hidden">
  <div (click)="isFilterModalOpen = false" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-gray-50/50">
      <span class="font-bold text-gray-800 text-sm">تنظیم فیلترهای نمایش</span>
      <button (click)="isFilterModalOpen = false" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="p-5 space-y-5 flex flex-col pb-7">
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">وضعیت فوریت:</label>
        <button (click)="toggleUrgent()" [ngClass]="filterUrgent ? 'bg-red-600 border-red-700 text-white shadow-inner translate-y-[1px]' : 'bg-gray-50 border-gray-200 text-gray-700'" class="w-full py-2.5 border font-semibold rounded-xl text-xs transition-all text-center">📌 فیلتر کارهای فوری</button>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">وضعیت اهمیت:</label>
        <button (click)="toggleImportant()" [ngClass]="filterImportant ? 'bg-indigo-600 border-indigo-700 text-white shadow-inner translate-y-[1px]' : 'bg-gray-50 border-gray-200 text-gray-700'" class="w-full py-2.5 border font-semibold rounded-xl text-xs transition-all text-center">⭐️ فیلتر کارهای مهم</button>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">انتخاب دسته‌بندی:</label>
        <button type="button" (click)="isMobileCatDropdownOpen = !isMobileCatDropdownOpen" class="w-full bg-gray-50 border border-gray-200 text-gray-700 font-semibold text-xs rounded-xl px-4 py-2.5 flex items-center justify-between shadow-sm">
          <span>{{ getMobileSelectedCategoryName() }}</span>
          <svg class="w-4 h-4 text-gray-400 transition-transform duration-200" [ngClass]="{'rotate-180': isMobileCatDropdownOpen}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>

        <div *ngIf="isMobileCatDropdownOpen" class="w-full mt-1 bg-gray-50 border border-gray-200/60 rounded-xl max-h-40 overflow-y-auto p-1 space-y-0.5">
          <button type="button" (click)="selectCategory('all')" [ngClass]="{'bg-white text-indigo-600 shadow-sm border border-gray-100': selectedFilterCategoryId === 'all'}" class="w-full text-right px-3 py-2 rounded-lg text-xs font-semibold text-gray-600 hover:bg-white flex items-center gap-2">
            <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span> همه دسته‌ها
          </button>
          <button type="button" *ngFor="let cat of categories" (click)="selectCategory(cat.id)" [ngClass]="{'bg-white text-indigo-600 shadow-sm border border-gray-100': selectedFilterCategoryId === cat.id}" class="w-full text-right px-3 py-2 rounded-lg text-xs font-semibold text-gray-600 hover:bg-white flex items-center gap-2">
            <span [className]="'w-2.5 h-2.5 rounded-full ' + cat.rawColor"></span> {{ cat.name }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
