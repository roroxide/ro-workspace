<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" dir="rtl">
  <div (click)="onClose()" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    
    <div class="flex items-center justify-between p-5 border-b border-gray-100 bg-gray-50/50">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
        </div>
        <h2 class="font-bold text-gray-800 text-base">ایجاد کار جدید</h2>
      </div>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-4">
      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">عنوان کار <span class="text-red-500">*</span></label>
        <input 
            type="text" 
            [(ngModel)]="taskTitle"
            placeholder="عنوان کار مورد نظر را وارد کنید..." 
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-sm" />
      </div>

      <div class="space-y-1">
        <label class="text-xs font-bold text-gray-500">جزییات و توضیحات تکمیلی</label>
        <textarea 
            rows="3" 
            [(ngModel)]="taskDesc"
            placeholder="توضیحات تکمیلی (اختیاری)..." 
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-sm resize-none"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="space-y-1 relative">
          <label class="text-xs font-bold text-gray-500 block text-right">دسته‌بندی</label>
          <div class="relative">
            <button (click)="isCategoryDropdownOpen = !isCategoryDropdownOpen; isStatusDropdownOpen = false" class="w-full flex items-center justify-between px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-sm text-gray-700 text-right">
              <div class="flex items-center gap-2">
                <span [className]="'w-2.5 h-2.5 rounded-full inline-block shrink-0 ' + selectedCategory.rawColor"></span>
                <span>{{ selectedCategory.name }}</span>
              </div>
              <svg class="w-4 h-4 text-gray-400 transition-transform" [ngClass]="{'rotate-180': isCategoryDropdownOpen}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div *ngIf="isCategoryDropdownOpen" class="absolute right-0 left-0 mt-1 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1 max-h-48 overflow-y-auto">
              <button *ngFor="let cat of categories" (click)="selectCategory(cat)" class="w-full text-right px-4 py-2.5 text-sm hover:bg-gray-50 text-gray-700 flex items-center gap-2 transition-colors">
                <span [style.background-color]="cat.rawColor" [className]="'w-2.5 h-2.5 rounded-full inline-block'"></span>
                <span [style.color]="cat.rawColor" class="font-bold">
                  {{ cat.name }}
                </span>
              </button>
            </div>
          </div>
        </div>

        <div class="space-y-1 relative">
          <label class="text-xs font-bold text-gray-500 block text-right">وضعیت شروع</label>
          <div class="relative">
            <button (click)="isStatusDropdownOpen = !isStatusDropdownOpen; isCategoryDropdownOpen = false" class="w-full flex items-center justify-between px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-sm text-gray-700 text-right">
              <span>{{ selectedStatus.name }}</span>
              <svg class="w-4 h-4 text-gray-400 transition-transform" [ngClass]="{'rotate-180': isStatusDropdownOpen}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div *ngIf="isStatusDropdownOpen" class="absolute right-0 left-0 mt-1 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1">
              <button *ngFor="let status of statuses" (click)="selectStatus(status)" class="w-full text-right px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors block">
                {{ status.name }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex gap-6">
        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" [(ngModel)]="isUrgent" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 accent-indigo-600" />
            <span class="text-xs font-semibold text-gray-600 group-hover:text-gray-800">📌 این کار فوری است</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" [(ngModel)]="isImportant" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 accent-indigo-600" />
            <span class="text-xs font-semibold text-gray-600 group-hover:text-gray-800">⭐️ این کار مهم است</span>
        </label>
      </div>
    </div>

    <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
      <button (click)="onClose()" class="px-4 py-2 bg-white border border-gray-200 text-gray-600 font-semibold rounded-xl text-xs hover:bg-gray-100 transition-all">انصراف</button>
      <button (click)="onSubmit()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-xs shadow-sm transition-all">ثبت و ذخیره کار</button>
    </div>
  </div>
</div>
