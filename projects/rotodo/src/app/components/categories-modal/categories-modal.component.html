<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" dir="rtl">
  <div (click)="onClose()" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    
    <div class="flex items-center justify-between p-5 border-b border-gray-100 bg-gray-50/50">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
        <h2 class="font-bold text-gray-800 text-base">مدیریت دسته‌بندی‌ها</h2>
      </div>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="p-5 overflow-y-auto max-h-[400px] space-y-3">
      <div *ngFor="let cat of categories" class="p-3 bg-gray-50 border border-gray-100 rounded-xl flex flex-col gap-3 transition-all">
        
        <div *ngIf="editingCatId !== cat.id" class="flex items-center justify-between w-full">
          <div class="flex items-center gap-2.5">
            <span [className]="'w-3 h-3 rounded-full ' + cat.rawColor"></span>
            <span class="text-sm font-semibold text-gray-700">{{ cat.name }}</span>
          </div>
          <button *ngIf="cat.id !== 'none'" (click)="startEdit(cat)" class="text-gray-400 hover:text-indigo-600 p-1.5 rounded-lg hover:bg-white border border-transparent hover:border-gray-100 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-5M18.364 4.364a1.854 1.854 0 112.607 2.607L12 16.243L8 17l.757-4L18.364 4.364z"></path></svg>
          </button>
        </div>

        <div *ngIf="editingCatId === cat.id" class="space-y-3 w-full animate-in fade-in duration-150">
          <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-400">نام دسته‌بندی</label>
            <input type="text" [(ngModel)]="editName" class="w-full px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 focus:outline-none focus:border-indigo-500" />
          </div>
          
          <div class="space-y-1">
            <label class="text-[10px] font-bold text-gray-400 block">رنگ نشانگر</label>
            <div class="flex gap-2 flex-wrap pt-1">
              <button *ngFor="let p of colorPalette" (click)="editSelectedColor = p.raw" [className]="'w-5 h-5 rounded-full transition-transform ' + p.raw + ' ' + (editSelectedColor === p.raw ? 'ring-2 ring-offset-2 ring-indigo-500 scale-110' : 'hover:scale-105')"></button>
            </div>
          </div>

          <div class="flex justify-end gap-2 pt-1">
            <button (click)="cancelEdit()" class="px-2.5 py-1 bg-white border border-gray-200 text-gray-500 rounded-lg text-[11px] font-semibold hover:bg-gray-100 transition-all">انصراف</button>
            <button (click)="saveEdit(cat)" class="px-3 py-1 bg-indigo-600 text-white rounded-lg text-[11px] font-semibold hover:bg-indigo-700 transition-all shadow-sm">ذخیره</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
