<div class="fixed inset-0 z-50 flex items-center justify-center p-4" dir="rtl">
  <div (click)="onClose()" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    
    <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-gray-50/50">
      <span class="font-bold text-gray-800 text-sm">مدیریت دسته‌بندی‌ها</span>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-600 p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="p-4 space-y-3 overflow-y-auto max-h-[60vh]">
      
      <div class="space-y-2">
        <div *ngFor="let cat of categories" class="bg-gray-50 p-2.5 rounded-xl border border-gray-100/70 transition-all">
          
          <div *ngIf="editingCategoryId !== cat.id" class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span [style.background-color]="isHex(cat.rawColor) ? cat.rawColor : ''"
                    [class]="!isHex(cat.rawColor) ? cat.rawColor : ''"
                    class="w-2.5 h-2.5 rounded-full block">
              </span>
              <span class="text-xs font-bold text-gray-700">{{ cat.name }}</span>
            </div>
            <button (click)="startEdit(cat)" class="text-gray-400 hover:text-indigo-600 p-1 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
          </div>

          <div *ngIf="editingCategoryId === cat.id" class="space-y-2.5 py-1">
            <input type="text" [(ngModel)]="editCatName" class="w-full px-2.5 py-1.5 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500 text-xs shadow-inner" />
            
            <div class="flex items-center justify-between gap-1 pt-1">
              <app-color-picker 
                *ngIf="editingCategoryId === cat.id"
                [selectedColor]="editCatColor" 
                (selectedColorChange)="editCatColor = $event">
              </app-color-picker>
              <div class="flex gap-1 shrink-0">
                <button (click)="saveEdit()" class="px-2 py-1 bg-indigo-600 text-white rounded-lg text-[10px] font-semibold">ثبت</button>
                <button (click)="cancelEdit()" class="px-2 py-1 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-semibold">لغو</button>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div *ngIf="!isNewCatFormOpen" class="pt-1">
        <button (click)="openNewCatForm()" class="w-full text-center py-2.5 rounded-xl text-xs font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100/80 transition-colors flex items-center justify-center gap-1 shadow-sm border border-indigo-100/30">
          <span>+ دسته‌بندی جدید</span>
        </button>
      </div>

      <div *ngIf="isNewCatFormOpen" class="p-3 bg-white rounded-xl border-2 border-indigo-100 space-y-3.5 animate-in fade-in slide-in-from-top-2 duration-200">
        <div>
          <label class="text-[10px] font-bold text-gray-400 mb-1 block">نام دسته‌بندی جدید:</label>
          <input type="text" [(ngModel)]="newCatName" placeholder="نام دسته‌بندی..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-500 text-xs shadow-inner" />
        </div>
        
        <div class="flex items-center justify-between bg-gray-50 p-2 rounded-xl border border-gray-100">
          <span class="text-[10px] font-bold text-gray-400 shrink-0">رنگ شناسه:</span>
          <app-color-picker 
            [selectedColor]="newCatColor" 
            (selectedColorChange)="newCatColor = $event">
          </app-color-picker>
        </div>

        <div class="flex gap-2 pt-1.5 border-t border-gray-50">
          <button (click)="saveCategory()" class="flex-1 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg text-xs transition-colors shadow-sm">ذخیره</button>
          <button (click)="isNewCatFormOpen = false" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-500 font-semibold rounded-lg text-xs transition-colors">انصراف</button>
        </div>
      </div>

    </div>
  </div>
</div>
