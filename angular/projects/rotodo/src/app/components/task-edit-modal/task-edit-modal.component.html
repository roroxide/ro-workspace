<div class="fixed inset-0 z-50 flex items-center justify-center p-4" dir="rtl">
  <div (click)="onClose()" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
  
  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-gray-100 z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
    
    <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-gray-50/50">
      <span class="font-bold text-gray-800 text-sm">ویرایش وظیفه</span>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-600 p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="p-5 space-y-4">
      
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">عنوان وظیفه:</label>
        <input type="text" [(ngModel)]="editedTask.title" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-xs shadow-inner" placeholder="عنوان را وارد کنید..." />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">توضیحات:</label>
        <textarea [(ngModel)]="editedTask.desc" rows="3" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white text-xs shadow-inner resize-none" placeholder="توضیحات وظیفه..."></textarea>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-400">دسته‌بندی:</label>
        <select [ngModel]="editedTask.category.id" (ngModelChange)="onCategoryChange($event)" class="bg-gray-50 border border-gray-200 text-gray-700 font-semibold text-xs rounded-xl px-3 py-2 focus:outline-none cursor-pointer shadow-sm w-full">
          <option *ngFor="let cat of categories" [value]="cat.id">
            {{ cat.name }}
          </option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-2">
        <label (click)="editedTask.isUrgent = !editedTask.isUrgent" class="flex items-center gap-2 bg-gray-50 p-2.5 rounded-xl border border-gray-100 cursor-pointer select-none text-xs text-gray-700 font-semibold">
          <input type="checkbox" [checked]="editedTask.isUrgent" class="rounded border-gray-300 text-red-600 focus:ring-red-500" />
          <span>📌 کار فوری</span>
        </label>

        <label (click)="editedTask.isImportant = !editedTask.isImportant" class="flex items-center gap-2 bg-gray-50 p-2.5 rounded-xl border border-gray-100 cursor-pointer select-none text-xs text-gray-700 font-semibold">
          <input type="checkbox" [checked]="editedTask.isImportant" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
          <span>⭐️ کار مهم</span>
        </label>
      </div>

    </div>

    <div class="p-4 bg-gray-50 border-t border-gray-100 flex gap-2">
      <button (click)="onSave()" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-xs transition-all shadow-md shadow-indigo-100">
        ذخیره تغییرات
      </button>
      <button (click)="onClose()" class="px-4 py-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-500 font-semibold rounded-xl text-xs transition-all">
        انصراف
      </button>
    </div>

  </div>
</div>
